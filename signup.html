<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeStay - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.signup-box{
    width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.signup-box h2{
    text-align:center;
    margin-bottom:10px;
}

.signup-box p{
    text-align:center;
    margin-bottom:25px;
    font-size:14px;
    opacity:0.9;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f4b400;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff9800;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:white;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="signup-box">

```
<h2>Create Account</h2>
<p>Register to access LuxeStay Hotel Management System</p>

<div class="input-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">
</div>

<div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
</div>

<div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create password">
</div>

<div class="input-group">
    <label>Account Type</label>
    <select id="role" style="width:100%; padding:12px; border:none; border-radius:10px; outline:none; background:white; color:black; font-family:'Poppins',sans-serif; cursor:pointer;">
        <option value="user">User</option>
        <option value="staff">Staff</option>
    </select>
</div>

<button onclick="signup()">Sign Up</button>

<div class="login-link">
    Already have an account?
    <a href="login.html">Login</a>
</div>
```

</div>

<script>

async function signup() {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const role = document.getElementById("role").value;

    if(!name || !email || !password || !role){
        alert("Please fill all fields");
        return;
    }

    try {

        const response = await fetch(
            "http://127.0.0.1:8000/api/auth/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name,
                    email,
                    password,
                    role
                })
            }
        );

        const data = await response.json();

        if(response.ok){

            alert("Account Created Successfully!");

            window.location.href = "login.html";

        } else {

            console.log(data);
            alert(JSON.stringify(data));

        }

    } catch(error){

        console.error(error);
        alert("Server Error");

    }
}

</script>
</body>
</html>
